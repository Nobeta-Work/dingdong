spring:
  application:
    name: gateway-service
  config:
    import: "optional:nacos:gateway-service.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        enabled: ${NACOS_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    baseline: v0.3

security:
  jwt:
    secret: ${JWT_SECRET:dingdong-change-this-development-secret-at-least-32-bytes}

app:
  routes:
    user: ${USER_SERVICE_URI:http://127.0.0.1:8081}
    product: ${PRODUCT_SERVICE_URI:http://127.0.0.1:8082}
    order: ${ORDER_SERVICE_URI:http://127.0.0.1:8083}
