spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: product-service
  config:
    import: "optional:nacos:product-service.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        enabled: ${NACOS_ENABLED:true}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/dingdong_product?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:dingdong}
    password: ${MYSQL_PASSWORD:dingdong_dev}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_dev}

server:
  port: ${SERVER_PORT:8082}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: -1
    serialization: fastjson2
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}
    register-mode: interface

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    baseline: v0.5

security:
  jwt:
    secret: ${JWT_SECRET:dingdong-change-this-development-secret-at-least-32-bytes}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:127.0.0.1:9876}
  producer:
    group: dingdong-product-producer

dingdong:
  image-bed:
    github:
      repo: ${GITHUB_IMAGE_BED_REPO:-}
      token: ${GITHUB_IMAGE_BED_TOKEN:${github.token}}
      branch: ${GITHUB_IMAGE_BED_BRANCH:main}
      folder: ${GITHUB_IMAGE_BED_FOLDER:product-images}
      raw-base-url: ${GITHUB_IMAGE_BED_RAW_BASE_URL:https://raw.githubusercontent.com}
