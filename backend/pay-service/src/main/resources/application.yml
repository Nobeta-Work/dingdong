spring:
  application:
    name: pay-service
  config:
    import: "optional:nacos:pay-service.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        enabled: ${NACOS_ENABLED:false}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/dingdong_pay?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:dingdong}
    password: ${MYSQL_PASSWORD:dingdong_dev}

server:
  port: ${SERVER_PORT:8084}

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    baseline: v0.4

security:
  jwt:
    secret: ${JWT_SECRET:dingdong-change-this-development-secret-at-least-32-bytes}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PAYMENT_PRODUCER_GROUP:payment-producer}

app:
  rocketmq:
    payment-success-topic: ${ROCKETMQ_PAYMENT_SUCCESS_TOPIC:payment-success}
