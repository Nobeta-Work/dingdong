spring:
  application:
    name: order-service
  config:
    import: "optional:nacos:order-service.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        enabled: ${NACOS_ENABLED:true}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/dingdong_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:dingdong}
    password: ${MYSQL_PASSWORD:dingdong_dev}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_dev}

server:
  port: ${SERVER_PORT:8083}

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    baseline: v0.5

security:
  jwt:
    secret: ${JWT_SECRET:dingdong-change-this-development-secret-at-least-32-bytes}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:127.0.0.1:9876}
  consumer:
    group: ${ROCKETMQ_ORDER_CONSUMER_GROUP:order-payment-consumer}

app:
  cart:
    key-prefix: ${CART_KEY_PREFIX:dingdong:cart:}
  rocketmq:
    payment-success-topic: ${ROCKETMQ_PAYMENT_SUCCESS_TOPIC:payment-success}
    payment-consumer-group: ${ROCKETMQ_ORDER_CONSUMER_GROUP:order-payment-consumer}
    order-timeout-topic: ${ROCKETMQ_ORDER_TIMEOUT_TOPIC:order-timeout}
    order-timeout-consumer-group: ${ROCKETMQ_ORDER_TIMEOUT_CONSUMER_GROUP:order-timeout-consumer}
  outbox:
    retry-delay-ms: ${OUTBOX_RETRY_DELAY_MS:60000}
