spring:
  application:
    name: user-service
  config:
    import: "optional:nacos:user-service.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      discovery:
        enabled: ${NACOS_ENABLED:true}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/dingdong_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:dingdong}
    password: ${MYSQL_PASSWORD:dingdong_dev}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_dev}

server:
  port: ${SERVER_PORT:8081}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: -1
    serialization: fastjson2
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}
    register-mode: interface

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    baseline: v0.2

security:
  jwt:
    secret: ${JWT_SECRET:dingdong-change-this-development-secret-at-least-32-bytes}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:7200}

tencent:
  sms:
    secret-id: your-secret-id
    secret-key: your-secret-key
    sdk-app-id: 1400000000
    sign-name: 你的签名内容
    template-id: 1234567
