name: dingdong

x-java-environment: &java-environment
  TZ: Asia/Shanghai
  NACOS_SERVER_ADDR: nacos:8848
  NACOS_ENABLED: "true"
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_USER: ${MYSQL_USER:-dingdong}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dingdong_dev}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
  ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
  JWT_SECRET: ${JWT_SECRET:-dingdong-change-this-development-secret-at-least-32-bytes}

x-java-service: &java-service
  restart: unless-stopped
  networks:
    - dingdong-net
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:$${SERVER_PORT}/actuator/health >/dev/null"]
    interval: 15s
    timeout: 5s
    retries: 20
    start_period: 30s

services:
  mysql:
    image: mysql:8.4
    container_name: dingdong-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
      MYSQL_DATABASE: dingdong_bootstrap
      MYSQL_USER: ${MYSQL_USER:-dingdong}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dingdong_dev}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - dingdong-net

  redis:
    image: redis:7.4-alpine
    container_name: dingdong-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - dingdong-net

  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: dingdong-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-ZGluZ2RvbmctZGV2ZWxvcG1lbnQtbmFjb3MtdG9rZW4tMjAyNg==}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-dingdong-identity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-dingdong-dev}
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      TZ: Asia/Shanghai
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_CONSOLE_PORT:-8085}:8080"
      - "9848:9848"
      - "9849:9849"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/ > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - dingdong-net

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: dingdong-rocketmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m -Xmn128m"
      TZ: Asia/Shanghai
    ports:
      - "9876:9876"
    networks:
      - dingdong-net

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: dingdong-rocketmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.3.1/conf/broker.conf
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m -Xmn128m"
      TZ: Asia/Shanghai
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./infra/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf:ro
    networks:
      - dingdong-net

  gateway-service:
    <<: *java-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway-service
    image: dingdong/gateway-service:local
    container_name: dingdong-gateway-service
    environment:
      <<: *java-environment
      SERVER_PORT: "8080"
      CORS_ALLOWED_ORIGIN_LOCALHOST: ${CORS_ALLOWED_ORIGIN_LOCALHOST:-http://localhost:*}
      CORS_ALLOWED_ORIGIN_LOOPBACK: ${CORS_ALLOWED_ORIGIN_LOOPBACK:-http://127.0.0.1:*}
    depends_on:
      nacos:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  user-service:
    <<: *java-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    image: dingdong/user-service:local
    container_name: dingdong-user-service
    environment:
      <<: *java-environment
      SERVER_PORT: "8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"

  product-service:
    <<: *java-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: product-service
    image: dingdong/product-service:local
    container_name: dingdong-product-service
    environment:
      <<: *java-environment
      SERVER_PORT: "8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    ports:
      - "${PRODUCT_SERVICE_PORT:-8082}:8082"

  order-service:
    <<: *java-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: order-service
    image: dingdong/order-service:local
    container_name: dingdong-order-service
    environment:
      <<: *java-environment
      SERVER_PORT: "8083"
      ROCKETMQ_ORDER_TIMEOUT_TOPIC: ${ROCKETMQ_ORDER_TIMEOUT_TOPIC:-order-timeout}
      OUTBOX_RETRY_DELAY_MS: ${OUTBOX_RETRY_DELAY_MS:-60000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started
    ports:
      - "${ORDER_SERVICE_PORT:-8083}:8083"

  pay-service:
    <<: *java-service
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: pay-service
    image: dingdong/pay-service:local
    container_name: dingdong-pay-service
    environment:
      <<: *java-environment
      SERVER_PORT: "8084"
      ROCKETMQ_PAYMENT_SUCCESS_TOPIC: ${ROCKETMQ_PAYMENT_SUCCESS_TOPIC:-payment-success}
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started
    ports:
      - "${PAY_SERVICE_PORT:-8084}:8084"

networks:
  dingdong-net:
    name: dingdong-net

volumes:
  mysql-data:
  redis-data:
